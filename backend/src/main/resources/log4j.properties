log4j.rootLogger = INFO, console, error,info

log4j.appender.console = org.apache.log4j.ConsoleAppender
log4j.appender.console.layout = org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern = %m,%d{yyy MMM dd HH:mm:ss,SSS}%n

log4j.appender.error = org.apache.log4j.FileAppender
log4j.appender.error.File = D:/code/Scala/recommend_bigdata/data/error.log
log4j.appender.error.Append = true
log4j.appender.error.Threshold = ERROR
log4j.appender.error.layout = org.apache.log4j.PatternLayout
log4j.appender.error.layout.ConversionPattern=%m,%d{yyy MMM dd HH:mm:ss,SSS}%n

log4j.appender.info = org.apache.log4j.FileAppender
log4j.appender.info.File = D:/code/Scala/recommend_bigdata/data/info.log
log4j.appender.info.Append = true
log4j.appender.info.Threshold = INFO
log4j.appender.info.layout = org.apache.log4j.PatternLayout
log4j.appender.info.layout.ConversionPattern=%m,%d{yyy MMM dd HH:mm:ss,SSS}%n